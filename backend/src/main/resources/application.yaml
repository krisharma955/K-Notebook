spring:
  application:
    name: K-Notebook

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/k-notebook-db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:replace_this_with_a_secure_random_string_in_production}
  expiration: 86400000

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin123}